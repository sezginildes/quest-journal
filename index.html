<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Görev Günlüğü — Oyunlaştırılmış Hayat RPG'si</title>
<meta name="theme-color" content="#d4af37">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Görev Günlüğü">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --brown-deep: #1a0e06;
  --brown-dark: #2d1b0e;
  --brown-mid: #4a3728;
  --brown-light: #6b4c35;
  --parchment-dark: #c9b483;
  --parchment: #e8d5a3;
  --parchment-light: #f4e4bc;
  --parchment-white: #faf0d8;
  --red-ink: #8b2500;
  --red-bright: #c0392b;
  --gold: #d4af37;
  --gold-bright: #ffd700;
  --gold-light: #ffe88a;
  --midnight: #1a1a3e;
  --magic-blue: #2d2d6b;
  --magic-glow: #6666ff;
  --green-health: #2d6b2d;
  --ink: #1a0e06;
  --shadow: rgba(0,0,0,0.6);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--brown-deep);
  background-image: 
    radial-gradient(ellipse at 20% 50%, #3d1f0a 0%, transparent 60%),
    radial-gradient(ellipse at 80% 50%, #1a0a2e 0%, transparent 60%),
    url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
  min-height: 100vh;
  font-family: 'Cormorant Garamond', serif;
  color: var(--ink);
  overflow-x: hidden;
}

/* PARTICLES */
#particles {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0; overflow: hidden;
}
.particle {
  position: absolute;
  width: 3px; height: 3px;
  background: var(--gold);
  border-radius: 50%;
  opacity: 0;
  animation: floatUp linear infinite;
}
@keyframes floatUp {
  0% { opacity: 0; transform: translateY(0) translateX(0); }
  10% { opacity: 0.6; }
  90% { opacity: 0.2; }
  100% { opacity: 0; transform: translateY(-100vh) translateX(var(--dx, 20px)); }
}

/* MAIN CONTAINER */
#app {
  position: relative; z-index: 1;
  max-width: 1400px; margin: 0 auto;
  padding: 20px;
  min-height: 100vh;
}

/* HEADER */
.header {
  text-align: center;
  padding: 30px 0 20px;
  position: relative;
}
.header-ornament {
  color: var(--gold);
  font-size: 1.5rem;
  letter-spacing: 8px;
  opacity: 0.7;
  display: block;
  margin-bottom: 8px;
}
.header h1 {
  font-family: 'Cinzel', serif;
  font-size: clamp(2rem, 5vw, 3.5rem);
  font-weight: 900;
  color: var(--gold);
  text-shadow: 0 0 20px rgba(212,175,55,0.5), 2px 2px 4px rgba(0,0,0,0.8);
  letter-spacing: 4px;
  line-height: 1.1;
}
.header-sub {
  font-family: 'Caveat', cursive;
  color: var(--parchment);
  font-size: 1.2rem;
  opacity: 0.7;
  margin-top: 6px;
}

/* CHARACTER BAR */
.char-bar {
  background: linear-gradient(135deg, var(--brown-dark), var(--brown-mid));
  border: 2px solid var(--gold);
  border-radius: 8px;
  padding: 16px 24px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 20px;
  flex-wrap: wrap;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5), inset 0 1px 0 rgba(212,175,55,0.2);
  position: relative;
  overflow: hidden;
}
.char-bar::before {
  content: '';
  position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
}
.char-avatar {
  width: 60px; height: 60px;
  border-radius: 50%;
  border: 2px solid var(--gold);
  background: linear-gradient(135deg, var(--midnight), var(--magic-blue));
  display: flex; align-items: center; justify-content: center;
  font-size: 1.8rem;
  box-shadow: 0 0 15px rgba(102,102,255,0.3);
  flex-shrink: 0;
}
.char-info { flex: 1; min-width: 200px; }
.char-name {
  font-family: 'Cinzel', serif;
  font-size: 1.2rem;
  color: var(--gold);
  font-weight: 600;
}
.char-title {
  font-family: 'Caveat', cursive;
  color: var(--parchment);
  font-size: 0.95rem;
  opacity: 0.8;
}
.char-level {
  background: linear-gradient(135deg, var(--gold), var(--gold-bright));
  color: var(--brown-deep);
  font-family: 'Cinzel', serif;
  font-weight: 700;
  font-size: 0.85rem;
  padding: 2px 10px;
  border-radius: 12px;
  margin-top: 4px;
  display: inline-block;
}
.xp-bar-wrap { flex: 2; min-width: 200px; }
.xp-label {
  font-size: 0.8rem;
  color: var(--parchment);
  opacity: 0.7;
  font-family: 'Cinzel', serif;
  letter-spacing: 1px;
  margin-bottom: 4px;
}
.xp-bar {
  height: 12px;
  background: rgba(0,0,0,0.4);
  border-radius: 6px;
  border: 1px solid rgba(212,175,55,0.3);
  overflow: hidden;
  position: relative;
}
.xp-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold-bright), var(--gold));
  border-radius: 6px;
  transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 0 8px rgba(212,175,55,0.6);
  background-size: 200% 100%;
  animation: shimmer 2s linear infinite;
}
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.stats-row {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.stat-badge {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  min-width: 55px;
}
.stat-icon { font-size: 1.2rem; }
.stat-val {
  font-family: 'Cinzel', serif;
  font-size: 0.9rem;
  color: var(--gold-bright);
  font-weight: 600;
  line-height: 1;
}
.stat-name {
  font-size: 0.65rem;
  color: var(--parchment);
  opacity: 0.6;
  letter-spacing: 0.5px;
  font-family: 'Cinzel', serif;
  text-transform: uppercase;
}
.streak-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,100,0,0.15);
  border: 1px solid rgba(255,100,0,0.4);
  border-radius: 20px;
  padding: 6px 14px;
  font-family: 'Cinzel', serif;
  font-size: 0.9rem;
  color: #ff8c42;
}
.flame-anim { animation: flicker 0.5s ease-in-out infinite alternate; }
@keyframes flicker {
  from { transform: scale(1); opacity: 1; }
  to { transform: scale(1.15) rotate(3deg); opacity: 0.8; }
}

/* NAVIGATION */
.nav-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 0;
  background: var(--brown-dark);
  border-radius: 8px 8px 0 0;
  padding: 8px 8px 0;
  border: 1px solid rgba(212,175,55,0.3);
  border-bottom: none;
  flex-wrap: wrap;
}
.tab-btn {
  font-family: 'Cinzel', serif;
  font-size: 0.8rem;
  letter-spacing: 1px;
  color: var(--parchment);
  background: rgba(0,0,0,0.2);
  border: 1px solid rgba(212,175,55,0.2);
  border-bottom: none;
  padding: 8px 16px;
  cursor: pointer;
  border-radius: 6px 6px 0 0;
  transition: all 0.2s;
  opacity: 0.7;
  white-space: nowrap;
}
.tab-btn:hover { opacity: 1; background: rgba(212,175,55,0.1); }
.tab-btn.active {
  background: var(--parchment-light);
  color: var(--brown-deep);
  opacity: 1;
  font-weight: 600;
}

/* BOOK */
.book {
  background: var(--parchment-light);
  border: 2px solid var(--brown-mid);
  border-radius: 0 8px 8px 8px;
  padding: 30px;
  min-height: 600px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6), inset 0 0 40px rgba(0,0,0,0.05);
  position: relative;
  background-image: 
    url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"),
    linear-gradient(180deg, var(--parchment-white) 0%, var(--parchment-light) 50%, var(--parchment) 100%);
}
.book::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 30px;
  background: linear-gradient(90deg, rgba(0,0,0,0.15), transparent);
  border-radius: 0 0 0 8px;
  pointer-events: none;
}

/* PAGE SECTIONS */
.page-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 30px;
}
@media (max-width: 900px) { .page-grid { grid-template-columns: 1fr; } }

.page-section h2 {
  font-family: 'Cinzel', serif;
  font-size: 1.2rem;
  color: var(--red-ink);
  border-bottom: 2px solid var(--red-ink);
  padding-bottom: 8px;
  margin-bottom: 16px;
  letter-spacing: 2px;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* QUEST CARDS */
.quest-board {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.quest-card {
  background: var(--parchment-white);
  border: 1px solid var(--parchment-dark);
  border-radius: 4px;
  padding: 14px;
  position: relative;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 2px 2px 8px rgba(0,0,0,0.15);
}
.quest-card:hover {
  transform: translateY(-2px);
  box-shadow: 4px 4px 16px rgba(0,0,0,0.25);
}
.quest-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  border-radius: 4px 0 0 4px;
}
.quest-card.cat-beden::before   { background: #c0392b; }
.quest-card.cat-zihin::before   { background: #2980b9; }
.quest-card.cat-kariyer::before { background: #d4af37; }
.quest-card.cat-iliski::before  { background: #8e44ad; }
.quest-card.cat-anlam::before   { background: #16a085; }
.quest-card.cat-sistem::before  { background: #2c3e50; }

.quest-title {
  font-family: 'Cinzel', serif;
  font-size: 0.95rem;
  color: var(--brown-dark);
  margin-bottom: 4px;
  font-weight: 600;
}
.quest-desc {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.9rem;
  color: var(--brown-light);
  font-style: italic;
  margin-bottom: 8px;
}
.quest-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.diff-badge {
  font-size: 0.7rem;
  font-family: 'Cinzel', serif;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 600;
  letter-spacing: 0.5px;
}
.diff-trivial { background: #d5d5d5; color: #555; }
.diff-easy { background: #c8e6c9; color: #2e7d32; }
.diff-medium { background: #fff9c4; color: #f57f17; }
.diff-hard { background: #ffccbc; color: #bf360c; }
.diff-epic { background: #e1bee7; color: #6a1b9a; }
.diff-legendary { background: linear-gradient(90deg, #ffd700, #ff8c00); color: #1a0e06; }

.xp-badge {
  font-size: 0.75rem;
  color: var(--gold);
  font-family: 'Cinzel', serif;
  font-weight: 600;
}
.cat-badge {
  font-size: 0.7rem;
  padding: 2px 8px;
  border-radius: 10px;
  font-family: 'Cinzel', serif;
}
.cat-beden   { background: rgba(192,57,43,0.1);  color: #c0392b; }
.cat-zihin   { background: rgba(41,128,185,0.1); color: #2980b9; }
.cat-kariyer { background: rgba(212,175,55,0.1); color: #b7950b; }
.cat-iliski  { background: rgba(142,68,173,0.1); color: #8e44ad; }
.cat-anlam   { background: rgba(22,160,133,0.1); color: #16a085; }
.cat-sistem  { background: rgba(44,62,80,0.1);   color: #2c3e50; }

/* EISENHOWER MATRIX */
.matrix-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 8px;
}
.matrix-quadrant {
  border-radius: 6px;
  padding: 12px;
  min-height: 120px;
}
.matrix-quadrant-title {
  font-family: 'Cinzel', serif;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.5px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.q1 { background: rgba(192,57,43,0.08);  border: 1px solid rgba(192,57,43,0.25); }
.q2 { background: rgba(212,175,55,0.08); border: 1px solid rgba(212,175,55,0.3); }
.q3 { background: rgba(41,128,185,0.08); border: 1px solid rgba(41,128,185,0.25); }
.q4 { background: rgba(100,100,100,0.06);border: 1px solid rgba(100,100,100,0.2); }
.q1 .matrix-quadrant-title { color: #c0392b; }
.q2 .matrix-quadrant-title { color: #b7950b; }
.q3 .matrix-quadrant-title { color: #2980b9; }
.q4 .matrix-quadrant-title { color: #7f8c8d; }

.matrix-card {
  background: rgba(255,255,255,0.5);
  border-radius: 4px;
  padding: 8px 10px;
  margin-bottom: 6px;
  cursor: grab;
  transition: all 0.2s;
  border-left: 3px solid transparent;
  font-size: 0.85rem;
}
.matrix-card:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
.matrix-card.dragging { opacity: 0.5; cursor: grabbing; }
.matrix-quadrant.drag-over { box-shadow: inset 0 0 0 2px var(--gold); }

.matrix-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 6px 12px;
  border-radius: 6px;
  border: 2px solid transparent;
  cursor: pointer;
  font-family: 'Cinzel', serif;
  font-size: 0.75rem;
  font-weight: 600;
  transition: all 0.2s;
  background: rgba(255,255,255,0.4);
}
.matrix-btn:hover { transform: translateY(-1px); }
.matrix-btn.selected { transform: scale(1.05); }
.matrix-btn.q1-btn { border-color: #c0392b; color: #c0392b; }
.matrix-btn.q1-btn.selected { background: rgba(192,57,43,0.15); }
.matrix-btn.q2-btn { border-color: #b7950b; color: #b7950b; }
.matrix-btn.q2-btn.selected { background: rgba(212,175,55,0.15); }
.matrix-btn.q3-btn { border-color: #2980b9; color: #2980b9; }
.matrix-btn.q3-btn.selected { background: rgba(41,128,185,0.15); }
.matrix-btn.q4-btn { border-color: #7f8c8d; color: #7f8c8d; }
.matrix-btn.q4-btn.selected { background: rgba(127,140,141,0.15); }

.urgent-seal {
  position: absolute;
  top: -8px; right: 12px;
  background: var(--red-ink);
  color: var(--parchment-light);
  font-family: 'Cinzel', serif;
  font-size: 0.6rem;
  letter-spacing: 1px;
  padding: 2px 8px;
  border-radius: 2px;
  transform: rotate(-2deg);
  box-shadow: 1px 1px 4px rgba(0,0,0,0.3);
}

.quest-actions {
  display: flex;
  gap: 6px;
  margin-top: 10px;
}
.btn-complete {
  flex: 1;
  background: linear-gradient(135deg, var(--green-health), #3d8b3d);
  color: white;
  border: none;
  border-radius: 4px;
  padding: 6px 12px;
  font-family: 'Cinzel', serif;
  font-size: 0.75rem;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.2s;
  font-weight: 600;
}
.btn-complete:hover { transform: translateY(-1px); filter: brightness(1.1); }
.btn-abandon {
  background: rgba(139,37,0,0.1);
  color: var(--red-ink);
  border: 1px solid rgba(139,37,0,0.3);
  border-radius: 4px;
  padding: 6px 10px;
  font-family: 'Cinzel', serif;
  font-size: 0.75rem;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-abandon:hover { background: rgba(139,37,0,0.2); }

/* ADD QUEST BUTTON */
.btn-add-quest {
  width: 100%;
  background: linear-gradient(135deg, rgba(212,175,55,0.15), rgba(212,175,55,0.05));
  border: 2px dashed rgba(212,175,55,0.4);
  border-radius: 4px;
  padding: 14px;
  font-family: 'Cinzel', serif;
  font-size: 0.9rem;
  color: var(--gold);
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.btn-add-quest:hover {
  background: linear-gradient(135deg, rgba(212,175,55,0.25), rgba(212,175,55,0.1));
  border-color: var(--gold);
}

/* QUEST LOG */
.log-entry {
  border-bottom: 1px solid rgba(74,55,40,0.2);
  padding: 12px 0;
  position: relative;
}
.log-entry:last-child { border-bottom: none; }
.log-title {
  font-family: 'Cinzel', serif;
  font-size: 0.9rem;
  color: var(--brown-dark);
  text-decoration: line-through;
  opacity: 0.7;
}
.log-meta {
  font-size: 0.8rem;
  color: var(--brown-light);
  font-family: 'Caveat', cursive;
  margin-top: 2px;
}
.log-xp {
  position: absolute;
  right: 0; top: 12px;
  font-family: 'Cinzel', serif;
  font-size: 0.8rem;
  color: var(--gold);
  font-weight: 600;
}

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 100;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--parchment-light);
  background-image: linear-gradient(180deg, var(--parchment-white) 0%, var(--parchment-light) 100%);
  border: 2px solid var(--brown-mid);
  border-radius: 8px;
  padding: 36px;
  max-width: 560px; width: 100%;
  max-height: 90vh; overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7);
  position: relative;
  animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes slideUp {
  from { transform: translateY(30px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.modal-title {
  font-family: 'Cinzel', serif;
  font-size: 1.5rem;
  color: var(--red-ink);
  text-align: center;
  margin-bottom: 6px;
  font-weight: 700;
}
.modal-subtitle {
  font-family: 'Caveat', cursive;
  text-align: center;
  color: var(--brown-light);
  font-size: 1rem;
  margin-bottom: 24px;
  opacity: 0.8;
}
.modal-close {
  position: absolute;
  top: 12px; right: 16px;
  background: none;
  border: none;
  font-size: 1.5rem;
  color: var(--brown-mid);
  cursor: pointer;
  line-height: 1;
  transition: color 0.2s;
}
.modal-close:hover { color: var(--red-ink); }

/* FORM */
.form-group {
  margin-bottom: 16px;
}
.form-label {
  display: block;
  font-family: 'Cinzel', serif;
  font-size: 0.8rem;
  letter-spacing: 1px;
  color: var(--brown-mid);
  margin-bottom: 6px;
  text-transform: uppercase;
}
.form-input, .form-select, .form-textarea {
  width: 100%;
  background: rgba(255,255,255,0.5);
  border: 1px solid var(--parchment-dark);
  border-radius: 4px;
  padding: 10px 14px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 1rem;
  color: var(--brown-dark);
  transition: border-color 0.2s;
  outline: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--gold);

async function signInWithGoogle() {
  const { error } = await sbClient.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.href }
  });
  if (error) toast('Giriş hatası: ' + error.message);
}

async function signOut() {
  await sbClient.auth.signOut();
  currentUser = null;
  state = null;
  renderAuthScreen();
}

// Karakter verisini Supabase'den yükle
async function loadCharacterFromCloud(userId) {
  const { data, error } = await sbClient
    .from('characters')
    .select('data')
    .eq('user_id', userId)
    .single();
  if (error || !data) return null;
  return data.data;
}

// Karakter verisini Supabase'e kaydet
async function saveCharacterToCloud(userId, characterData) {
  await sbClient
    .from('characters')
    .upsert({ user_id: userId, data: characterData, updated_at: new Date().toISOString() }, { onConflict: 'user_id' });
}

// Realtime sync — başka cihazdan değişiklik gelince otomatik güncelle
let realtimeChannel = null;
function startRealtimeSync(userId) {
  if (realtimeChannel) sbClient.removeChannel(realtimeChannel);
  
  realtimeChannel = sbClient
    .channel('character-sync')
    .on('postgres_changes', {
      event: 'UPDATE',
      schema: 'public',
      table: 'characters',
      filter: `user_id=eq.${userId}`
    }, (payload) => {
      // Başka cihazdan güncelleme geldi
      const newData = payload.new?.data;
      if (!newData) return;
      
      // Eğer şu anki state'den daha yeni ise güncelle
      const newUpdated = new Date(payload.new?.updated_at || 0);
      const localUpdated = new Date(state?._lastSaved || 0);
      
      if (newUpdated > localUpdated) {
        state = newData;
        render();
        toast('🔄 Başka cihazdan senkronize edildi');
      }
    })
    .subscribe();
}

// Supabase log fonksiyonu
async function logToSupabase(data) {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/quest_logs`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify(data)
    });
    if (!res.ok) console.warn('Supabase log hatası:', await res.text());
  } catch(e) {
    console.warn('Supabase bağlantı hatası:', e);
  }
}

// Auth başlat
async function initAuth() {
  // Client'ı burada initialize et — CDN yüklenmiş olur
  sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Double hash fix — ## yerine # olmalı
  if (window.location.hash.startsWith('#access_token') || window.location.href.includes('##access_token')) {
    const fixedHash = window.location.hash.replace(/^#+/, '#');
    if (fixedHash !== window.location.hash) {
      window.location.hash = fixedHash.substring(1);
    }
  }
  const { data: { session } } = await sbClient.auth.getSession();
  
  if (session?.user) {
    currentUser = session.user;
    await loadAndStartApp();
  } else {
    renderAuthScreen();
  }

  // Auth değişikliklerini dinle
  sbClient.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session?.user) {
      currentUser = session.user;
      await loadAndStartApp();
    } else if (event === 'SIGNED_OUT') {
      currentUser = null;
      state = null;
      renderAuthScreen();
    }
  });
}

async function loadAndStartApp() {
  // Önce buluttan yükle
  const cloudData = await loadCharacterFromCloud(currentUser.id);
  if (cloudData) {
    state = cloudData;
    showSetup = false;
  } else {
    const local = loadState();
    if (local) {
      state = local;
      showSetup = false;
      await saveCharacterToCloud(currentUser.id, state);
    } else {
      state = null;
      showSetup = true;
    }
  }

  // Eski kategori isimlerini yeniye migrate et
  if (state) {
    const catMap = {
      health: 'beden', intelligence: 'zihin',
      money: 'kariyer', relationships: 'iliski'
    };
    const migrateCat = (cat) => catMap[cat] || cat;
    if (state.quests) state.quests.forEach(q => { q.category = migrateCat(q.category); });
    if (state.completedQuests) state.completedQuests.forEach(q => { q.category = migrateCat(q.category); });
    // catCounts migrate
    if (state.catCounts) {
      const newCounts = { beden: 0, zihin: 0, kariyer: 0, iliski: 0, anlam: 0, sistem: 0 };
      Object.entries(state.catCounts).forEach(([k, v]) => { newCounts[migrateCat(k)] = (newCounts[migrateCat(k)] || 0) + v; });
      state.catCounts = newCounts;
    }
    saveState(state);
  }

  initParticles();
  render();
  
  // Realtime sync başlat
  startRealtimeSync(currentUser.id);
}

function loadState() {
  try { return JSON.parse(localStorage.getItem('rpg_quest_journal')) || null; } catch { return null; }
}
function saveState(state) {
  try { 
    state._lastSaved = new Date().toISOString();
    localStorage.setItem('rpg_quest_journal', JSON.stringify(state)); 
  } catch {}
  if (currentUser) saveCharacterToCloud(currentUser.id, state);
}

function getXPForLevel(n) { return n * n * 50 + n * 50; }
function getLevelFromXP(xp) {
  let level = 1;
  while (xp >= getXPForLevel(level)) { xp -= getXPForLevel(level); level++; }
  return { level, xpIntoLevel: xp, xpForNext: getXPForLevel(level) };
}

function defaultState(name, charClass, title) {
  return {
    name, charClass, title,
    xp: 0,
    level: 1,
    stats: { vitality: 10, wisdom: 10, fortune: 10, charisma: 10 },

    todayCount: 0,

    maxQuestsInDay: 0,

  };
}

// STREAK LOGIC
// ─────────────────────────────────────────────

function updateStreak() {
  const today = new Date().toDateString();
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  if (!state.lastQuestDate) {
    state.streak = 1;
  } else if (state.lastQuestDate === today) {
    // same day, no change
  } else if (state.lastQuestDate === yesterday) {
    state.streak++;
  } else {
    state.streak = 1;
  }
  state.lastQuestDate = today;

  // Today's count
  if (state.todayDate !== today) {
    state.todayCount = 0;
    state.todayDate = today;
  }
  state.todayCount++;
  if (state.todayCount > (state.maxQuestsInDay || 0)) state.maxQuestsInDay = state.todayCount;

  // Heatmap
  state.heatmap = state.heatmap || {};
  state.heatmap[today] = (state.heatmap[today] || 0) + 1;
}

// ─────────────────────────────────────────────
// REWARD SYSTEM
// ─────────────────────────────────────────────

function rollReward(difficulty) {
  const diff = DIFFICULTIES[difficulty];
  const baseChance = 0.70;
  const streakBonus = Math.min(state.streak * 0.01, 0.10);
  const fortuneBonus = (state.stats.fortune - 10) * 0.005;
  let chance = baseChance + diff.rewardMod + streakBonus + fortuneBonus;
  chance = Math.min(Math.max(chance, 0), 1);
  if (difficulty === 'legendary') chance = 1;
  
  if (Math.random() > chance) return null;

  // Tier roll
  const tierRoll = Math.random();
  let tier;
  if (tierRoll < 0.01) tier = 'legendary';
  else if (tierRoll < 0.05) tier = 'epic';
  else if (tierRoll < 0.20) tier = 'rare';
  else if (tierRoll < 0.50) tier = 'uncommon';
  else tier = 'common';

  const poolForTier = state.rewards.filter(r => r.tier === tier);
  const fallback = state.rewards[Math.floor(Math.random() * state.rewards.length)];
  const reward = poolForTier.length > 0 
    ? poolForTier[Math.floor(Math.random() * poolForTier.length)] 
    : fallback;

  return { ...reward, tier };
}

function completeQuest(questId) {
  const idx = state.quests.findIndex(q => q.id === questId);
  if (idx === -1) return;

  // Geri alma için snapshot al
  const snapshot = JSON.parse(JSON.stringify(state));
  
  const quest = state.quests.splice(idx, 1)[0];
  
  // XP calculation
  let xp = DIFFICULTIES[quest.difficulty].xp;
  
  // Streak bonus
  const streakMult = 1 + Math.min(state.streak * 0.10, 1.0);
  xp = Math.round(xp * streakMult);

  // Class bonus
  const cls = CLASSES.find(c => c.id === state.charClass);
  if (cls) {
    if (cls.stat === 'all') xp = Math.round(xp * cls.mult);
    else if (cls.stat === quest.category) xp = Math.round(xp * cls.mult);
  }

  // First quest of day bonus
  if (state.todayCount === 0) xp += 25;

  updateStreak();

  // Category mastery
  state.catCounts[quest.category] = (state.catCounts[quest.category] || 0) + 1;
  if (state.catCounts[quest.category] % 10 === 0) xp += 50;

  state.totalCompleted++;
  if (quest.difficulty === 'legendary') state.completedLegendary++;

  // Stat gain
  const catToStat = { beden: 'vitality', zihin: 'wisdom', kariyer: 'fortune', iliski: 'charisma', anlam: 'wisdom', sistem: 'fortune' };
  const statKey = catToStat[quest.category];
  if (statKey && state.stats[statKey] < 100) state.stats[statKey] = Math.min(100, state.stats[statKey] + 1);

  // XP add
  const prevLevel = getLevelFromXP(state.xp).level;
  state.xp += xp;
  const newLvl = getLevelFromXP(state.xp).level;

  // Log
  quest.completedAt = new Date().toLocaleDateString();
  quest.xpGained = xp;
  state.completedQuests.unshift(quest);
  if (state.completedQuests.length > 50) state.completedQuests.pop();

  // Check achievements
  checkAchievements();
  saveState(state);

  // Geri alma timer'ı
  lastCompletedQuest = { snapshot, questTitle: quest.title };
  if (undoTimer) clearTimeout(undoTimer);
  showUndoToast();
  undoTimer = setTimeout(() => {
    lastCompletedQuest = null;
    hideUndoToast();
  }, 30000);

  // Supabase'e kayıt
  const rewardRoll = rollReward(quest.difficulty);
  logToSupabase({
    user_id: state.name || 'sezgin',
    quest_title: quest.title,
    category: quest.category,
    sub_category: quest.subCategory || null,
    difficulty: quest.difficulty,
    xp_gained: xp,
    streak_day: state.streak,
    reward_tier: rewardRoll?.tier || null,
    reward_title: rewardRoll?.title || null,
    completed_date: new Date().toISOString().split('T')[0]
  });

  // Float XP
  floatXP(xp);

  // Level up?
  if (newLvl > prevLevel) {
    newLevel = newLvl;
    showLevelUp = true;
    spawnBurstParticles();
  }

  // Reward modal — aynı roll'u kullan
  pendingReward = { reward: rewardRoll, xp };
  showRewardModal = true;

  render();
}

function abandonQuest(questId) {
  const idx = state.quests.findIndex(q => q.id === questId);
  if (idx === -1) return;
  state.quests.splice(idx, 1);
  saveState(state);
  toast('Görev terk edildi. Kader memnun değil...');
  render();
}

function addQuest(data) {
  const quest = {
    id: state.nextQuestId++,
    title: data.title,
    description: data.description,
    category: data.category,
    subCategory: data.subCategory || null,
    difficulty: data.difficulty,
    dueDate: data.dueDate || null,
    color: data.color || getCatColor(data.category),
    matrix: data.matrix || 'q2',
    createdAt: new Date().toLocaleDateString()
  };
  state.quests.push(quest);
  saveState(state);
  toast('Yeni görev kabul edildi! ⚔️');
  render();
}

function checkAchievements() {
  const stats = { ...state, level: getLevelFromXP(state.xp).level };
  ACHIEVEMENTS.forEach(a => {
    if (!state.achievements.includes(a.id) && a.condition(stats)) {
      state.achievements.push(a.id);
      setTimeout(() => toast(`🏆 Başarım Açıldı: ${a.name}!`), 800);
    }
  });
}

function hideUndoToast() {
  const el = document.getElementById('undo-toast');
  if (el) el.remove();

function undoComplete() {
  if (!lastCompletedQuest) return;
  state = lastCompletedQuest.snapshot;
  saveState(state);
  lastCompletedQuest = null;
  if (undoTimer) clearTimeout(undoTimer);
  hideUndoToast();
  showRewardModal = false;
  pendingReward = null;
  showLevelUp = false;
  toast('Görev geri alındı ↩');
  render();
}

function undoFromLog(logIdx) {
  const quest = state.completedQuests[logIdx];
  if (!quest) return;
  // XP geri al
  const xpToRemove = quest.xpGained || DIFFICULTIES[quest.difficulty]?.xp || 0;
  state.xp = Math.max(0, state.xp - xpToRemove);
  // Stat geri al
  const catToStat = { beden: 'vitality', zihin: 'wisdom', kariyer: 'fortune', iliski: 'charisma', anlam: 'wisdom', sistem: 'fortune' };
  const statKey = catToStat[quest.category];
  if (statKey && state.stats[statKey] > 10) state.stats[statKey] = Math.max(10, state.stats[statKey] - 1);
  // Sayaçları geri al
  state.totalCompleted = Math.max(0, state.totalCompleted - 1);
  if (quest.difficulty === 'legendary') state.completedLegendary = Math.max(0, state.completedLegendary - 1);
  if (state.catCounts[quest.category]) state.catCounts[quest.category] = Math.max(0, state.catCounts[quest.category] - 1);
  // Görevi aktif listeye geri ekle
  delete quest.completedAt;
  delete quest.xpGained;
  state.quests.unshift(quest);
  // Log'dan çıkar
  state.completedQuests.splice(logIdx, 1);
  saveState(state);
  toast('Görev aktif listeye geri alındı ↩');
  render();
}

      ${renderTab()}

  `;

  // Modals
  if (showQuestModal) html += renderQuestModal();
  if (showRewardModal) html += renderRewardModal();
  if (showLevelUp) html += renderLevelUpModal();

  app.innerHTML = html;
}

function tabLabel(t) {
  return { quests: '⚔️ Görevler', character: '🧙 Karakter', achievements: '🏆 Başarımlar', rewards: '🎁 Ödüller', stats: '📊 Tarih', settings: '⚙️ Ayarlar' }[t];
}

function switchTab(t) { activeTab = t; render(); }

function renderTab() {
  if (activeTab === 'quests') return renderQuestsTab();
  if (activeTab === 'character') return renderCharacterTab();
  if (activeTab === 'achievements') return renderAchievementsTab();
  if (activeTab === 'rewards') return renderRewardsTab();
  if (activeTab === 'stats') return renderStatsTab();
  if (activeTab === 'settings') return renderSettingsTab();
  return '';
}

function renderStatsTab() {

  for (let i = 51; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const key = d.toDateString();
    const count = (state.heatmap || {})[key] || 0;
    const cls = count === 0 ? '' : count === 1 ? 'h1' : count <= 3 ? 'h2' : count <= 6 ? 'h3' : 'h4';
    cells.push(`<div class="heat-cell ${cls}" title="${key}: ${count} quest${count !== 1 ? 's' : ''}"></div>`);
  }
  
  const catData = state.catCounts || {};
  const maxCat = Math.max(...Object.values(catData), 1);
  const catBars = Object.entries(CATEGORIES).map(([key, cat]) => {
    const count = catData[key] || 0;
    const pct = (count / maxCat * 100).toFixed(0);
    return `
      <div class="cat-bar-row">
        <div class="cat-bar-label">${cat.icon} ${cat.label}</div>
        <div class="cat-bar-track">
          <div class="cat-bar-fill" style="width:${pct}%;background:${cat.fill}"></div>
        </div>
        <div class="cat-bar-count">${count}</div>
      </div>
    `;
  }).join('');

  return `
    <div class="stats-section">
      <h2 style="font-family:'Cinzel',serif;font-size:1.2rem;color:var(--red-ink);border-bottom:2px solid var(--red-ink);padding-bottom:8px;margin-bottom:20px;letter-spacing:2px">📊 KAHRAMANLIK TARİHİ</h2>
      
      <div style="font-family:'Cinzel',serif;font-size:0.8rem;letter-spacing:1px;color:var(--brown-mid);text-transform:uppercase;margin-bottom:10px">Aktivite — Son 52 Gün</div>
      <div class="heatmap-row">${cells.join('')}</div>
      
      <div style="font-family:'Cinzel',serif;font-size:0.8rem;letter-spacing:1px;color:var(--brown-mid);text-transform:uppercase;margin-bottom:14px;margin-top:24px">Görev Kategorileri</div>

      <div style="font-family:'Cinzel',serif;font-size:0.8rem;letter-spacing:1px;color:var(--brown-mid);text-transform:uppercase;margin-bottom:14px;margin-top:24px">Alt Kategori Dağılımı</div>
      <div class="cat-bars">
        ${Object.entries(SUB_CATEGORIES).flatMap(([catKey, subs]) =>
          subs.map(sub => {
            const count = (state.completedQuests || []).filter(q => q.category === catKey && q.subCategory === sub.id).length;
            const catFill = CATEGORIES[catKey]?.fill || '#888';
            const pct = count === 0 ? 0 : Math.max(8, Math.round(count / Math.max(...Object.entries(SUB_CATEGORIES).flatMap(([ck, ss]) => ss.map(s => (state.completedQuests || []).filter(q => q.category === ck && q.subCategory === s.id).length)), 1) * 100));
            return `

                <div class="cat-bar-track">
                  <div class="cat-bar-fill" style="width:${pct}%;background:${catFill};opacity:0.7"></div>
                </div>
                <div class="cat-bar-count">${count}</div>
              </div>`;
          })
        ).join('')}
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:24px">
        ${[
          ['🏅', 'Tamamlanan', state.totalCompleted],
          ['🔥', 'En İyi Seri', state.maxQuestsInDay || 0],

function selectMatrix(id) {
  ['q1','q2','q3','q4'].forEach(m => {
    const btn = document.getElementById('mbtn-' + m);
    if (btn) btn.classList.toggle('selected', m === id);
  });
  const input = document.getElementById('q-matrix');
  if (input) input.value = id;
}

let draggedQuestId = null;
function dragStart(event, questId) {
  draggedQuestId = questId;
  event.dataTransfer.effectAllowed = 'move';
}
function dropToMatrix(event, matrixId, el) {
  event.preventDefault();
  el.classList.remove('drag-over');
  if (!draggedQuestId) return;
  const q = state.quests.find(q => q.id === draggedQuestId);
  if (q) {
    q.matrix = matrixId;
    // En sona ekle
    const inMatrix = state.quests.filter(x => (x.matrix || 'q2') === matrixId);
    q.order = inMatrix.length * 10;
    saveState(state);
    render();
  }
  draggedQuestId = null;
}

function dropOnCard(event, targetQuestId, matrixId) {
  event.preventDefault();
  event.stopPropagation();
  if (!draggedQuestId || draggedQuestId === targetQuestId) return;

  const inMatrix = state.quests
    .filter(q => (q.matrix || 'q2') === matrixId)
    .sort((a, b) => (a.order || 0) - (b.order || 0));

  const fromIdx = inMatrix.findIndex(q => q.id === draggedQuestId);
  const toIdx = inMatrix.findIndex(q => q.id === targetQuestId);

  if (fromIdx === -1 || toIdx === -1) {
    // Farklı kutudan geliyor — sadece matris değiştir
    const q = state.quests.find(q => q.id === draggedQuestId);
    if (q) { q.matrix = matrixId; q.order = toIdx * 10; }
  } else {
    // Aynı kutu içinde sıra değiştir
    const moved = inMatrix.splice(fromIdx, 1)[0];
    inMatrix.splice(toIdx, 0, moved);
    inMatrix.forEach((q, i) => { q.order = i * 10; });
  }

  saveState(state);
  render();
  draggedQuestId = null;
}

// Kategori rengini al — kullanıcı özelleştirmişse ondan, yoksa varsayılandan
function getCatColor(catId) {
  const custom = state.categoryColors?.[catId];
  return custom || CATEGORIES[catId]?.color || '#4a3728';
}

// Kategori rengini güncelle
function updateCatColor(catId, color) {
  if (!state.categoryColors) state.categoryColors = {};
  state.categoryColors[catId] = color;
  // Mevcut görevlerin renklerini de güncelle
  state.quests.forEach(q => { if (q.category === catId) q.color = color; });
  saveState(state);
  render();
}

function updateSubCats() {
  const cat = document.getElementById('q-cat')?.value;
  const sel = document.getElementById('q-subcat');
  if (!sel) return;
  const subs = SUB_CATEGORIES[cat] || [];
  sel.innerHTML = subs.length
    ? '<option value="">— Seç (isteğe bağlı) —</option>' + subs.map(s => `<option value="${s.id}">${s.label}</option>`).join('')
    : '<option value="">— Alt kategori yok —</option>';
}

function submitQuest() {
  const title = document.getElementById('q-title')?.value?.trim();
  const desc = document.getElementById('q-desc')?.value?.trim();
  const cat = document.getElementById('q-cat')?.value;
  const subcat = document.getElementById('q-subcat')?.value || null;
  const diff = document.getElementById('q-diff')?.value;
  const due = document.getElementById('q-due')?.value;
  const matrix = document.getElementById('q-matrix')?.value || 'q2';
  if (!title || !cat || !diff) { toast('Tüm zorunlu alanları doldur!'); return; }
  // Rengi kategoriden al, kullanıcı özel renk belirlemediyse
  const catColor = getCatColor(cat);
  showQuestModal = false;
  addQuest({ title, description: desc, category: cat, subCategory: subcat, difficulty: diff, dueDate: due, color: catColor, matrix });
}

function openQuestModal() { showQuestModal = true; render(); }
function closeModal(e) { if (e.target.classList.contains('modal-overlay')) { showQuestModal = false; showRewardModal = false; render(); } }

// ── REWARD MODAL ──
function renderRewardModal() {
  if (!pendingReward) return '';
  const { reward, xp } = pendingReward;
  
  const tierConfig = {
    common:    { color: '#9e9e9e', glow: 'rgba(158,158,158,0.4)', chest: '📦' },
    uncommon:  { color: '#4caf50', glow: 'rgba(76,175,80,0.5)',   chest: '🟩' },
    rare:      { color: '#2196f3', glow: 'rgba(33,150,243,0.5)',  chest: '💠' },
    epic:      { color: '#9c27b0', glow: 'rgba(156,39,176,0.5)',  chest: '🔮' },
    legendary: { color: '#d4af37', glow: 'rgba(212,175,55,0.6)',  chest: '✨' }
  };

  if (!reward) {
    return `
      <div class="modal-overlay" onclick="closeReward()">
        <div class="modal reward-modal" onclick="event.stopPropagation()">
          <div class="xp-gained">+${xp} XP</div>
          <div class="no-reward-face">🪙</div>
          <div style="font-family:'Cinzel',serif;font-size:1rem;color:var(--brown-dark);margin:8px 0;font-weight:600">Bu Sefer Ödül Yok</div>
          <div class="no-reward-text">"Kader bu sefer cömert davranmadı... ama XP'n sonsuzdur."</div>
          <button class="btn-claim" onclick="closeReward()" style="background:var(--brown-mid);color:var(--parchment)">İlerlemeye Devam Et</button>
        </div>
      </div>
    `;
  }

  const cfg = tierConfig[reward.tier] || tierConfig.common;
  return `
    <div class="modal-overlay" onclick="closeReward()">
      <div class="modal reward-modal" onclick="event.stopPropagation()">
        <div style="font-family:'Cinzel',serif;font-size:1rem;color:var(--brown-mid);letter-spacing:2px;text-transform:uppercase">Görev Tamamlandı!</div>
        <div class="xp-gained">+${xp} XP</div>
        <div class="chest-wrap" style="--reward-color:${cfg.color}">
          <div class="chest-burst"></div>
          <div class="chest-emoji" style="filter:drop-shadow(0 0 15px ${cfg.glow})">${cfg.chest}🎁</div>
        </div>
        <span class="reward-tier-banner tier-${reward.tier}">${(reward.tier || 'common').toUpperCase()} ÖDÜL</span>
        <div style="font-size:2.5rem;margin:8px 0">${reward.emoji || '🎁'}</div>
        <div class="reward-text">${escHtml(reward.title)}</div>
        <button class="btn-claim" onclick="closeReward()">✦ Ödülü Al ✦</button>
      </div>
    </div>
  `;
}

function closeReward() {
  showRewardModal = false;
  pendingReward = null;
  if (showLevelUp) { render(); return; }
  render();
}

// ── LEVEL UP ──
function renderLevelUpModal() {
  const flavor = LEVEL_FLAVORS[(newLevel - 1) % LEVEL_FLAVORS.length];
  return `
    <div class="levelup-overlay" onclick="closeLevelUp()">
      <div class="levelup-content">
        <div class="levelup-title">SEVİYE ATLADI!</div>
        <div class="levelup-num">${newLevel}</div>
        <div class="levelup-flavor">"${flavor}"</div>
        <div style="color:var(--gold);font-family:'Cinzel',serif;font-size:0.9rem;letter-spacing:2px;margin-top:8px">TÜM STATSLAR +1</div>
        <button class="btn-continue" onclick="closeLevelUp()">Yolculuğuna Devam Et</button>
      </div>
    </div>
  `;
}

function closeLevelUp() { showLevelUp = false; render(); }

// ── SETUP ──
function renderSetup(app) {
  let selectedClass = 'adventurer';
  
  app.innerHTML = `
    <div class="header">
      <span class="header-ornament">✦ ✦ ✦</span>
      <h1>Görev Günlüğü</h1>
      <div class="header-sub">~ Efsaneni Yaz ~</div>
    </div>
    <div class="book">
      <div class="setup-screen">
        <h2>Kahramanını Yarat</h2>
        <div class="setup-sub">Her büyük efsane bir isimle başlar...</div>
        
        <div class="form-group">
          <label class="form-label">Adın, Kahraman</label>
          <input class="form-input" id="s-name" placeholder="Adını gir..." />
        </div>
        <div class="form-group">
          <label class="form-label">Unvanın</label>
          <input class="form-input" id="s-title" placeholder="örn. Bilginin Arayıcısı, Yılmaz Savaşçı..." />
        </div>
        
        <div class="form-label" style="margin-bottom:10px">Sınıfını Seç</div>
        <div class="class-grid">
          ${CLASSES.map(c => `
            <div class="class-btn ${c.id === 'adventurer' ? 'selected' : ''}" id="cls-${c.id}" onclick="selectClass('${c.id}')">
              <div class="class-icon">${c.icon}</div>
              <div class="class-name">${c.name}</div>
              <div class="class-bonus">${c.bonus}</div>
            </div>
          `).join('')}
        </div>
        
        <button class="btn-sign" style="margin-top:8px" onclick="beginJourney()">✦ Efsaneni Başlat ✦</button>
      </div>
    </div>
  `;
}

let pendingClass = 'adventurer';
function selectClass(id) {
  pendingClass = id;
  document.querySelectorAll('.class-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('cls-' + id)?.classList.add('selected');
}

function beginJourney() {
  const name = document.getElementById('s-name')?.value?.trim();
  const title = document.getElementById('s-title')?.value?.trim();
  if (!name) { toast('Bir isme sahip olmalısın, kahraman!'); return; }
  state = defaultState(name, pendingClass || 'adventurer', title);
  // Başlangıç görevleri
  state.quests = [
    { id: state.nextQuestId++, title: 'Bugünkü en önemli görevini tamamla', description: 'Zihninde en büyük ejderhayı yüzüne bak.', category: 'zihin', difficulty: 'medium', createdAt: new Date().toLocaleDateString() },
    { id: state.nextQuestId++, title: '30 dakika egzersiz yap', description: 'Beden ruhun evidir. Onu güçlendir.', category: 'beden', difficulty: 'easy', createdAt: new Date().toLocaleDateString() }
  ];
  saveState(state);
  showSetup = false;
  render();
  toast('Hoş geldin, ' + name + '! Efsanen şimdi başlıyor.');
}

// ── SETTINGS TAB ──
function renderSettingsTab() {
  return `
    <div style="max-width:600px">
      <h2 style="font-family:'Cinzel',serif;font-size:1.2rem;color:var(--red-ink);border-bottom:2px solid var(--red-ink);padding-bottom:8px;margin-bottom:20px;letter-spacing:2px">⚙️ KATEGORİ RENKLERİ</h2>
      <p style="font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--brown-mid);margin-bottom:20px;font-size:1rem">Her kategorinin rengini özelleştir. Değişiklik mevcut tüm görevlere yansır.</p>
      <div style="display:flex;flex-direction:column;gap:16px">
        ${Object.entries(CATEGORIES).map(([id, cat]) => {
          const currentColor = getCatColor(id);
          return `
            <div style="display:flex;align-items:center;gap:16px;background:rgba(255,255,255,0.3);border:1px solid rgba(74,55,40,0.2);border-radius:6px;padding:14px">
              <div style="width:40px;height:40px;border-radius:50%;background:${currentColor};border:2px solid rgba(0,0,0,0.1);flex-shrink:0"></div>
              <div style="flex:1">
                <div style="font-family:'Cinzel',serif;font-size:0.9rem;font-weight:600;color:var(--brown-dark)">${cat.icon} ${cat.label}</div>
                <div style="font-size:0.75rem;color:var(--brown-light);margin-top:2px">${currentColor}</div>
              </div>
              <div style="display:flex;gap:6px;flex-wrap:wrap">
                ${['#c0392b','#e67e22','#f1c40f','#27ae60','#2980b9','#8e44ad','#16a085','#d35400','#2c3e50','#1a5276'].map(c => `
                  <div onclick="updateCatColor('${id}','${c}')" 
                       style="width:24px;height:24px;border-radius:50%;background:${c};cursor:pointer;border:${currentColor===c?'3px solid var(--gold)':'2px solid transparent'};transition:all 0.2s"
                       title="${c}"></div>
                `).join('')}
              </div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getClassEmoji(id) {
  return CLASSES.find(c => c.id === id)?.icon || '🗺️';
}

function getClassName(id) {
  return CLASSES.find(c => c.id === id)?.name || 'Maceracı';
}

// ─────────────────────────────────────────────

initParticles();
initAuth();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/service-worker.js')
      .then(reg => console.log('SW kayıtlı:', reg.scope))
      .catch(err => console.log('SW hatası:', err));
  });
}
</script>
